name: Build Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t rohandevops4/firstapp:${{ github.run_number }} \
            -t rohandevops4/firstapp:latest \
            ./app

      - name: Show Current Directory
        run: pwd

      - name: List Repository Files
        run: ls -R

      - name: Push Docker Images
        run: |
          docker push rohandevops4/firstapp:${{ github.run_number }}
          docker push rohandevops4/firstapp:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/FirstApp
            export IMAGE_TAG=${{ github.run_number }}
            docker pull rohandevops4/firstapp:$IMAGE_TAG
            docker-compose -f docker-compose.prod.yml -d up

      - name: List Docker Images
        run: docker images
